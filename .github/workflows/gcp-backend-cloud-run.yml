name: Deploy Backend To Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/gcp-backend-cloud-run.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'asia-southeast1' }}
  SERVICE_NAME: atai-travel-api
  REPOSITORY: atai-travel
  IMAGE_NAME: backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backend tests
        working-directory: backend
        env:
          SECRET_KEY: test-secret-for-ci
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -v

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Create Artifact Registry repository if missing
        run: |
          gcloud artifacts repositories describe "$REPOSITORY" \
            --location="$REGION" \
            || gcloud artifacts repositories create "$REPOSITORY" \
              --repository-format=docker \
              --location="$REGION" \
              --description="Atai Travel containers"

      - name: Build and push image
        working-directory: backend
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --add-cloudsql-instances "${{ secrets.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}" \
            --set-env-vars "ENVIRONMENT=production,FRONTEND_URL=${{ vars.FRONTEND_URL }},COOKIE_SECURE=true,COOKIE_SAMESITE=none,ACCESS_TOKEN_EXPIRE_MINUTES=1440" \
            --set-secrets "SECRET_KEY=atai-secret-key:latest,DATABASE_URL=atai-database-url:latest"
